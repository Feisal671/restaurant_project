<!doctype html>
<html>
  <head>
    <title>Restaurant Menu</title>
  </head>
  <body>
    <h1>Our Menu</h1>
    {% for item in items %}
    <div>
      <h2>{{ item.name }}</h2>
      <p>{{ item.description }}</p>
      <p>Price: ${{ item.price }}</p>
      <p>Available: {{ item.available }}</p>
    </div>
    <hr />
    {% endfor %}
  </body>
</html>
